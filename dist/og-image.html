<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Generator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #111928 0%, #1F2937 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Background pattern */
        .pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(255,255,255,0.1) 50px, rgba(255,255,255,0.1) 51px),
                repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(255,255,255,0.1) 50px, rgba(255,255,255,0.1) 51px);
        }
        
        /* Red accent circle */
        .circle {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(227, 10, 26, 0.3) 0%, transparent 70%);
            top: -200px;
            right: -100px;
        }
        
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px;
            max-width: 900px;
        }
        
        .logo-container {
            margin-bottom: 40px;
        }
        
        .logo {
            width: 200px;
            height: auto;
        }
        
        h1 {
            font-size: 72px;
            font-weight: 800;
            color: white;
            margin: 0 0 20px 0;
            line-height: 1.1;
            letter-spacing: -1px;
        }
        
        .highlight {
            color: #E30A1A;
            display: block;
        }
        
        .subtitle {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.9);
            margin: 0 0 30px 0;
            font-weight: 500;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 40px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 48px;
            font-weight: 800;
            color: #E30A1A;
            display: block;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .cta {
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #E30A1A;
            color: white;
            padding: 20px 50px;
            border-radius: 12px;
            font-size: 28px;
            font-weight: 700;
            box-shadow: 0 8px 30px rgba(227, 10, 26, 0.4);
        }
        
        .arrow {
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="pattern"></div>
    <div class="circle"></div>
    
    <div class="content">
        <div class="logo-container">
            <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 86 48" fill="none">

                <path d="M79.3647 25.0682H85.8503V47.5126H79.3647V25.0682Z" fill="white"/>
            </svg>
        </div>
        
        <h1>
            Staň se obchodníkem
            <span class="highlight">až 200 000 Kč / měsíc</span>
        </h1>
        
        <p class="subtitle">Profesionální kariéra s férovou provizí</p>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-value">200K+</span>
                <span class="stat-label">Měsíční výdělek</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">100%</span>
                <span class="stat-label">Férová provize</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">0 Kč</span>
                <span class="stat-label">Vstupní náklady</span>
            </div>
        </div>
        
        <div class="cta">
            Mám zájem
            <span class="arrow">→</span>
        </div>
    </div>
</body>
</html>
